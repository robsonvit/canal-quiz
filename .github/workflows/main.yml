name: 🧠 Gerar Short de Quiz

on:
  # ── Disparos automáticos 3x/dia (UTC — fuso Brasília UTC-3) ──────────────
  schedule:
    - cron: '0 9 * * *'    # 06:00 BRT → manhã
    - cron: '0 15 * * *'   # 12:00 BRT → tarde
    - cron: '0 21 * * *'   # 18:00 BRT → noite

  # ── Execução manual ───────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      tema:
        description: 'Tema do quiz (opcional — deixe vazio para aleatório)'
        required: false
        default: ''
        type: string

permissions:
  contents: write    # Para salvar tracking de perguntas usadas

env:
  GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
  PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
  YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

jobs:
  gerar-quiz-short:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🎬 Instalar FFmpeg e fontes
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-liberation \
            fonts-freefont-ttf \
            fonts-dejavu-extra

      - name: 📦 Instalar dependências Python
        run: pip install -r requirements.txt

      - name: 📁 Criar diretórios necessários
        run: mkdir -p output data output/imagens output/tmp_img

      - name: 🧠 Executar pipeline de Quiz
        run: python scripts/pipeline.py

      - name: 📊 Verificar arquivos gerados
        run: |
          echo "📁 Arquivos na pasta output:"
          ls -lh output/ 2>/dev/null || echo "(vazia)"
          echo ""
          echo "🧠 Quiz gerado:"
          cat output/quiz.json 2>/dev/null | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          print(f'Tema      : {data.get(\"tema\", \"?\")}')
          print(f'Pergunta  : {data.get(\"pergunta_texto\", \"?\")[:80]}...')
          print(f'Resposta  : {data.get(\"resposta_texto\", \"?\")}')
          print(f'Título    : {data.get(\"titulo\", \"?\")}')
          " || echo "(quiz.json não encontrado)"

      - name: 💾 Salvar tracking de perguntas no repositório
        run: |
          git config user.name "Canal Quiz Bot"
          git config user.email "bot@canal-quiz.com"
          git add data/perguntas_usadas.json
          git diff --staged --quiet || git commit -m "🧠 Atualiza tracking de perguntas [skip ci]"
          git pull --rebase origin main || git pull --rebase origin master || true
          git push || true

      - name: 📤 Upload de artefatos (backup por 3 dias)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quiz-short-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            output/*.mp4
            output/quiz.json
          retention-days: 3
